name: EAS Build - Android APK (Local)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'artifacts/mobile/**'
      - '.github/workflows/eas-build.yml'

jobs:
  build:
    name: Build Android APK (Local - No EAS Credits)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: .

      - name: Setup EAS CLI
        run: npm install -g eas-cli@latest
        
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Android APK locally
        run: eas build --local --platform android --profile preview --non-interactive --output ./gold-spin-preview.apk
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gold-spin-apk
          path: artifacts/mobile/gold-spin-preview.apk
          retention-days: 30

      - name: Build Complete!
        run: |
          echo "=========================================="
          echo "  APK built successfully!"
          echo "  Download from GitHub Actions Artifacts"
          echo "=========================================="
